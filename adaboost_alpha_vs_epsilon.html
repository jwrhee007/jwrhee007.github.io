<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdaBoost α vs ε</title>
<style>
  body { margin: 0; padding: 24px; font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #1a1a1a; }
  @media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #e0e0e0; } }
  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; font-size: 12px; color: #666; }
  @media (prefers-color-scheme: dark) { .legend { color: #aaa; } }
  .legend span { display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>
<div style="position: relative; width: 100%; max-width: 720px; height: 400px; margin: 0 auto;">
  <canvas id="alphaChart" role="img" aria-label="AdaBoost step size alpha as a function of weighted classification error epsilon">Step size alpha as function of error epsilon</canvas>
</div>
<div class="legend" style="max-width: 720px; margin: 8px auto 0;">
  <span><span style="width: 10px; height: 10px; border-radius: 2px; background: #378ADD;"></span>α = ½ ln((1−ε)/ε)</span>
  <span><span style="width: 10px; height: 2px; background: #E24B4A;"></span>ε = 0.5 (random guessing)</span>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const eps = [];
const alpha = [];
for (let e = 0.01; e <= 0.99; e += 0.005) {
  eps.push(Math.round(e * 1000) / 1000);
  alpha.push(Math.round(0.5 * Math.log((1 - e) / e) * 1000) / 1000);
}
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
const textColor = isDark ? '#c2c0b6' : '#3d3d3a';

new Chart(document.getElementById('alphaChart'), {
  type: 'line',
  data: {
    labels: eps,
    datasets: [{
      label: 'α',
      data: alpha,
      borderColor: '#378ADD',
      backgroundColor: 'rgba(55,138,221,0.08)',
      fill: true,
      pointRadius: 0,
      borderWidth: 2.5,
      tension: 0.1
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title: (items) => 'ε = ' + items[0].label,
          label: (item) => 'α = ' + Number(item.raw).toFixed(2)
        }
      }
    },
    scales: {
      x: {
        title: { display: true, text: 'ε (weighted classification error)', color: textColor, font: { size: 13 } },
        ticks: {
          color: textColor,
          maxTicksLimit: 6,
          callback: function(val, idx) {
            const v = this.getLabelForValue(val);
            if ([0.01, 0.2, 0.4, 0.5, 0.6, 0.8, 0.99].some(t => Math.abs(v - t) < 0.01)) return v;
            return null;
          }
        },
        grid: { color: gridColor }
      },
      y: {
        title: { display: true, text: 'α (step size)', color: textColor, font: { size: 13 } },
        min: -3,
        max: 4,
        ticks: { color: textColor, stepSize: 1 },
        grid: { color: gridColor }
      }
    }
  },
  plugins: [{
    id: 'verticalLine',
    afterDraw(chart) {
      const xScale = chart.scales.x;
      const yScale = chart.scales.y;
      const ctx = chart.ctx;
      const idx = eps.findIndex(e => Math.abs(e - 0.5) < 0.006);
      if (idx >= 0) {
        const xPixel = xScale.getPixelForValue(idx);
        ctx.save();
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = '#E24B4A';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(xPixel, yScale.top);
        ctx.lineTo(xPixel, yScale.bottom);
        ctx.stroke();
        ctx.restore();
        ctx.save();
        ctx.font = '12px sans-serif';
        ctx.fillStyle = '#E24B4A';
        ctx.textAlign = 'left';
        ctx.fillText('ε = 0.5', xPixel + 6, yScale.top + 16);
        ctx.fillText('α = 0', xPixel + 6, yScale.top + 30);
        ctx.restore();
      }
      const idx2 = eps.findIndex(e => Math.abs(e - 0.05) < 0.006);
      if (idx2 >= 0) {
        const xP = xScale.getPixelForValue(idx2);
        const yP = yScale.getPixelForValue(alpha[idx2]);
        ctx.save();
        ctx.font = '11px sans-serif';
        ctx.fillStyle = '#185FA5';
        ctx.textAlign = 'center';
        ctx.fillText('ε→0: α→∞', xP + 40, yP - 8);
        ctx.fillText('(매우 정확 → 큰 가중치)', xP + 40, yP + 6);
        ctx.restore();
      }
    }
  }]
});
</script>
</body>
</html>
