<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 0. Introduction — ML Visual Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#fafaf8;--card:#fff;--text:#1a1a1a;--sub:#6b6b6b;--border:#e8e6e1;--accent:#2563eb;--accent2:#0d9488;--code-bg:#f4f3ef;}
@media(prefers-color-scheme:dark){:root{--bg:#18181b;--card:#27272a;--text:#f0f0ec;--sub:#a1a1aa;--border:#3f3f46;--accent:#60a5fa;--accent2:#2dd4bf;--code-bg:#1f1f23;}}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.7;}
.container{max-width:720px;margin:0 auto;}
.back{font-size:.85rem;color:var(--sub);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:1.5rem;}
.back:hover{color:var(--accent);}
h1{font-size:1.5rem;font-weight:700;margin-bottom:.25rem;}
.topic-sub{font-size:.9rem;color:var(--sub);margin-bottom:2rem;}
.vis-section{margin-bottom:3rem;}
.vis-title{font-size:1.05rem;font-weight:500;margin-bottom:.5rem;padding-left:12px;border-left:3px solid var(--accent);}
.vis-desc{font-size:.85rem;color:var(--sub);margin-bottom:1rem;}
.vis-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;overflow:hidden;}
svg text{font-family:'Noto Sans KR','Helvetica Neue',sans-serif;}
.t{font-size:14px;fill:var(--text);}
.ts{font-size:12px;fill:var(--sub);}
.th{font-size:14px;fill:var(--text);font-weight:500;}
.box rect{fill:var(--code-bg);stroke:var(--border);}
.arr{stroke:var(--sub);stroke-width:1.5;}
.leader{stroke:var(--sub);stroke-width:0.5;stroke-dasharray:4 3;}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5;stroke-width:0.5;} .c-blue .th,.c-blue .t{fill:#0C447C;} .c-blue .ts{fill:#185FA5;}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5;} .c-teal .th,.c-teal .t{fill:#085041;} .c-teal .ts{fill:#0F6E56;}
.c-coral rect{fill:#FAECE7;stroke:#993C1D;stroke-width:0.5;} .c-coral .th,.c-coral .t{fill:#712B13;} .c-coral .ts{fill:#993C1D;}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5;} .c-gray .th,.c-gray .t{fill:#444441;} .c-gray .ts{fill:#5F5E5A;}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5;} .c-purple .th,.c-purple .t{fill:#3C3489;} .c-purple .ts{fill:#534AB7;}
@media(prefers-color-scheme:dark){
  .c-blue rect{fill:#0C447C;stroke:#85B7EB;} .c-blue .th,.c-blue .t{fill:#B5D4F4;} .c-blue .ts{fill:#85B7EB;}
  .c-teal rect{fill:#085041;stroke:#5DCAA5;} .c-teal .th,.c-teal .t{fill:#9FE1CB;} .c-teal .ts{fill:#5DCAA5;}
  .c-coral rect{fill:#712B13;stroke:#F0997B;} .c-coral .th,.c-coral .t{fill:#F5C4B3;} .c-coral .ts{fill:#F0997B;}
  .c-gray rect{fill:#444441;stroke:#B4B2A9;} .c-gray .th,.c-gray .t{fill:#D3D1C7;} .c-gray .ts{fill:#B4B2A9;}
  .c-purple rect{fill:#3C3489;stroke:#AFA9EC;} .c-purple .th,.c-purple .t{fill:#CECBF6;} .c-purple .ts{fill:#AFA9EC;}
}
.footer{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border);font-size:.8rem;color:var(--sub);display:flex;justify-content:space-between;}
.footer a{color:var(--accent);text-decoration:none;}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← 목차로 돌아가기</a>
<h1>Topic 0. Introduction</h1>
<p class="topic-sub">전통적인 컴퓨터 과학 vs 머신러닝, AI/ML/DL의 관계</p>

<div class="vis-section">
  <div class="vis-title">전통적 프로그래밍 vs 머신러닝</div>
  <p class="vis-desc">전통적 방식은 사람이 규칙을 작성하지만, ML은 데이터가 규칙을 만들어냅니다.</p>
  <div class="vis-card">
    <svg width="100%" viewBox="0 0 680 400">
      <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
      <text class="th" x="170" y="36" text-anchor="middle">Traditional programming</text>
      <text class="th" x="510" y="36" text-anchor="middle">Machine learning</text>
      <line x1="340" y1="20" x2="340" y2="370" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4 4"/>
      <g class="c-blue"><rect x="60" y="70" width="100" height="44" rx="8"/><text class="th" x="110" y="92" text-anchor="middle" dominant-baseline="central">Input</text></g>
      <g class="c-blue"><rect x="60" y="150" width="100" height="44" rx="8"/><text class="th" x="110" y="172" text-anchor="middle" dominant-baseline="central">Program</text></g>
      <line x1="160" y1="92" x2="190" y2="92" class="arr" marker-end="url(#arrow)"/>
      <line x1="160" y1="172" x2="190" y2="172" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray"><rect x="195" y="66" width="120" height="134" rx="8"/><text class="th" x="255" y="125" text-anchor="middle" dominant-baseline="central">Computer</text><text class="ts" x="255" y="147" text-anchor="middle" dominant-baseline="central">executes</text></g>
      <line x1="255" y1="200" x2="255" y2="220" class="arr" marker-end="url(#arrow)"/>
      <g class="c-teal"><rect x="205" y="225" width="100" height="44" rx="8"/><text class="th" x="255" y="247" text-anchor="middle" dominant-baseline="central">Output</text></g>
      <text class="ts" x="170" y="300" text-anchor="middle">사람이 규칙을 만든다</text>
      <g class="c-coral"><rect x="400" y="70" width="100" height="44" rx="8"/><text class="th" x="450" y="92" text-anchor="middle" dominant-baseline="central">Input</text></g>
      <g class="c-coral"><rect x="400" y="150" width="100" height="44" rx="8"/><text class="th" x="450" y="172" text-anchor="middle" dominant-baseline="central">Output</text></g>
      <line x1="500" y1="92" x2="530" y2="92" class="arr" marker-end="url(#arrow)"/>
      <line x1="500" y1="172" x2="530" y2="172" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray"><rect x="535" y="66" width="120" height="134" rx="8"/><text class="th" x="595" y="125" text-anchor="middle" dominant-baseline="central">Computer</text><text class="ts" x="595" y="147" text-anchor="middle" dominant-baseline="central">learns</text></g>
      <line x1="595" y1="200" x2="595" y2="220" class="arr" marker-end="url(#arrow)"/>
      <g class="c-teal"><rect x="545" y="225" width="100" height="44" rx="8"/><text class="th" x="595" y="247" text-anchor="middle" dominant-baseline="central">Program</text></g>
      <text class="ts" x="510" y="300" text-anchor="middle">데이터가 규칙을 만든다</text>
      <g class="c-blue"><rect x="50" y="330" width="240" height="50" rx="8"/><text class="th" x="170" y="349" text-anchor="middle" dominant-baseline="central">if whiskers → cat</text><text class="ts" x="170" y="367" text-anchor="middle" dominant-baseline="central">Manually coded rules</text></g>
      <g class="c-coral"><rect x="390" y="330" width="240" height="50" rx="8"/><text class="th" x="510" y="349" text-anchor="middle" dominant-baseline="central">1000 photos → patterns</text><text class="ts" x="510" y="367" text-anchor="middle" dominant-baseline="central">Learned from data</text></g>
    </svg>
  </div>
</div>

<div class="vis-section">
  <div class="vis-title">AI, ML, DL의 관계</div>
  <p class="vis-desc">AI가 가장 넓은 범위이고, 그 안에 ML, 다시 그 안에 DL이 포함됩니다.</p>
  <div class="vis-card">
    <svg width="100%" viewBox="0 0 680 400">
      <g class="c-blue"><rect x="40" y="20" width="600" height="360" rx="24"/><text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">Artificial intelligence</text><text class="ts" x="340" y="72" text-anchor="middle" dominant-baseline="central">Sense, reason, act, adapt</text></g>
      <text class="ts" x="100" y="340" text-anchor="start">Rule-based systems</text>
      <text class="ts" x="100" y="358" text-anchor="start">Expert systems</text>
      <text class="ts" x="470" y="340" text-anchor="start">Search algorithms</text>
      <text class="ts" x="470" y="358" text-anchor="start">Knowledge graphs</text>
      <g class="c-teal"><rect x="90" y="95" width="500" height="230" rx="20"/><text class="th" x="340" y="122" text-anchor="middle" dominant-baseline="central">Machine learning</text><text class="ts" x="340" y="142" text-anchor="middle" dominant-baseline="central">Learn from data, improve with experience</text></g>
      <text class="ts" x="130" y="290" text-anchor="start">Decision trees</text>
      <text class="ts" x="130" y="308" text-anchor="start">SVM, kNN</text>
      <text class="ts" x="430" y="290" text-anchor="start">Random forest</text>
      <text class="ts" x="430" y="308" text-anchor="start">Linear regression</text>
      <g class="c-purple"><rect x="160" y="165" width="360" height="100" rx="16"/><text class="th" x="340" y="200" text-anchor="middle" dominant-baseline="central">Deep learning</text><text class="ts" x="340" y="220" text-anchor="middle" dominant-baseline="central">Multi-layer neural networks</text><text class="ts" x="340" y="240" text-anchor="middle" dominant-baseline="central">CNN, RNN, Transformer, LLM</text></g>
    </svg>
  </div>
</div>

<div class="footer">
  <a href="index.html">← 목차</a>

</div>
</div>
</body>
</html>
